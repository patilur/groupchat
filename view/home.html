<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        /* Sidebar for navigation between personal and group chats */
        .sidebar {
            width: 300px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .search-section,
        .groups-section {
            margin-bottom: 30px;
        }

        #suggestions,
        #groupList {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .list-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: #f8f9fa;
        }

        /* Main Chat Window */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 15px;
            background: #24f3ae;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9f9f9;
        }

        /* Message Bubbles */
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 75%;
        }

        .sent {
            margin-left: auto;
            background: #dcf8c6;
            text-align: right;
        }

        .received {
            margin-right: auto;
            background: #fff;
            border: 1px solid #ddd;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="search-section">
            <h6 class="mb-3">Personal Chat</h6>
            <input type="text" id="searchEmail" class="form-control mb-2" placeholder="Enter email"
                oninput="searchUsers()" list="emailSuggestions" />
            <datalist id="emailSuggestions"></datalist>

            <button class="btn btn-sm btn-outline-primary w-100" onclick="startChat()">Start Personal Chat</button>
        </div>

        <hr>

        <div class="groups-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0">Groups</h6>
                <button class="btn btn-sm btn-success" onclick="createGroup()">+</button>
            </div>
            <div id="groupList">
                <div class="text-muted small text-center">Click + to create a group</div>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0" id="chatHeaderTitle">Select a chat to start</h5>
            <button id="addMemberBtn" class="btn btn-sm btn-dark" onclick="inviteMember()" style="display: none;">
                + Add Member
            </button>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input">
            <input type="file" id="fileInput" style="display: none;" onchange="uploadMedia()" />

            <button class="btn btn-outline-secondary me-2" onclick="document.getElementById('fileInput').click()">
                📎
            </button>
            <input type="text" id="messageInput" class="form-control me-2" placeholder="Type a message...">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/chat.js"></script>
</body>

</html>
