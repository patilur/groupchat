<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Group Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
        }

        .chat-container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            padding: 15px;
            background: #0d6efd;
            color: white;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
            max-width: 70%;
        }

        .sent {
            margin-left: auto;
            text-align: right;
        }

        .received {
            margin-right: auto;
            text-align: left;
        }

        .bubble {
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .sent .bubble {
            background: #0d6efd;
            color: white;
        }

        .received .bubble {
            background: #e4e6eb;
        }

        .timestamp {
            font-size: 10px;
            color: gray;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
    </style>

</head>

<body>

    <div class="chat-container">


        <div class="chat-header">
            <h5>Group Chat</h5>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input">
            <input type="text" id="messageInput" class="form-control me-2" placeholder="Type a message...">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/chat.js"></script>


</body>

</html>
